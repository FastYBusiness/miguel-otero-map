<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Mapa Profesional Miguel Otero</title>

<style>
body {
  margin: 0;
  background: #0f172a;
}

#mindmap {
  width: 100vw;
  height: 100vh;
}

text {
  fill: #ffffff;
  font-size: 16px;
  font-weight: 500;
}

path {
  stroke: #38bdf8;
  stroke-width: 2;
}
</style>

</head>

<body>

<svg id="mindmap"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>

<script>
const { Markmap } = window.markmap;

const data = {
  content: "Miguel Otero Cabaleiro",
  children: [
    {
      content: "Núcleo Profesional",
      children: [
        { content: "+30 años experiencia operativa" },
        { content: "Ordeno sistemas y equipos" },
        { content: "Mejora continua sin fricción" }
      ]
    },
    {
      content: "Perfil Operativo",
      children: [
        { content: "Maquinaria pesada hasta 64T" },
        { content: "Logística y transporte" },
        { content: "Resolución de incidencias en campo" }
      ]
    },
    {
      content: "Perfil Organizativo",
      children: [
        { content: "Coordinación de equipos" },
        { content: "Gestión de estructuras empresariales" },
        { content: "Optimización de procesos" }
      ]
    },
    {
      content: "Perfil Estratégico",
      children: [
        { content: "IA aplicada (en formación)" },
        { content: "Automatización de tareas" },
        { content: "Mejora de decisiones operativas" }
      ]
    }
  ]
};

Markmap.create("#mindmap", {
  autoFit: true,
  initialExpandLevel: 2
}, data);
</script>

</body>
</html>
