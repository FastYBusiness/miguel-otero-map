<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Mapa Profesional Miguel Otero</title>

<style>
body {
  margin: 0;
  background: #0f172a;
}

#mindmap {
  width: 100vw;
  height: 100vh;
}

/* Texto visible */
.markmap text {
  fill: #ffffff !important;
  font-size: 16px;
  font-weight: 500;
}

/* Líneas visibles */
.markmap path {
  stroke: #38bdf8 !important;
  stroke-width: 2;
}

/* Nodos */
.markmap circle {
  fill: #38bdf8 !important;
}
</style>

</head>

<body>

<svg id="mindmap"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>

<script>
const { Markmap } = window.markmap;

const data = {
  content: "Miguel Otero Cabaleiro",
  children: [
    {
      content: "Núcleo Profesional",
      children: [
        { content: "+30 años experiencia operativa" },
        { content: "Ordeno sistemas, alineo equipos y elimino fricción" },
        { content: "Visión estructural con ejecución real" }
      ]
    },
    {
      content: "Perfil Operativo (Físico)",
      children: [
        { content: "Maquinaria pesada hasta 64T (obra civil, cantera, AVE)" },
        { content: "Transporte y logística (camión + grúa, rutas, entregas)" },
        { content: "Resolución de incidencias en campo en tiempo real" },
        { content: "Mantenimiento preventivo y correctivo" }
      ]
    },
    {
      content: "Perfil Organizativo (Mental)",
      children: [
        { content: "Coordinación de equipos y estructuras" },
        { content: "Presidencia federación empresarial (hasta 100 asociados)" },
        { content: "Gestión institucional y subvenciones públicas" },
        { content: "Optimización de procesos y reducción de fricción" }
      ]
    },
    {
      content: "Perfil Estratégico (Evolución)",
      children: [
        { content: "IA aplicada a procesos productivos (en desarrollo)" },
        { content: "Automatización de tareas (RPA)" },
        { content: "Análisis de datos operativos" },
        { content: "Optimización de sistemas y toma de decisiones" }
      ]
    },
    {
      content: "Aplicación Profesional Directa",
      children: [
        { content: "Jefe de equipo / capataz" },
        { content: "Responsable de operaciones" },
        { content: "Logística y transporte" },
        { content: "Comercial técnico (industrial / HORECA)" },
        { content: "Docente técnico-operativo" }
      ]
    }
  ]
};

Markmap.create("#mindmap", {
  autoFit: true,
  initialExpandLevel: 2
}, data);
</script>

</body>
</html>
